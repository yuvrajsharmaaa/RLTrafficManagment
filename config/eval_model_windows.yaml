# Model-compatible evaluation config on Windows (no additional files)

environment:
  net_file: "networks/delhi/delhi_intersection.net.xml"
  route_file: "networks/delhi/routes.rou.xml"
  use_gui: false
  num_seconds: 1800
  delta_time: 5
  yellow_time: 3
  min_green: 10
  max_green: 50
  reward_fn: "custom"

state:
  include_density: true
  include_queue: true
  include_phase: true
  include_time_on_phase: true

actions:
  num_phases: 4
  phases:
    - "NS-green"
    - "EW-green"
    - "NS-left"
    - "EW-left"

reward:
  waiting_time_weight: -1.0
  phase_change_penalty: 0.1
  queue_weight: 0.0

dqn:
  learning_rate: 0.001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  batch_size: 64
  buffer_size: 100000
  target_update_freq: 100
  hidden_layers: [256, 256]
  activation: "relu"

training:
  num_episodes: 500
  max_steps_per_episode: 720
  save_freq: 50
  eval_freq: 25
  seed: 42
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

evaluation:
  num_episodes: 3
  render: false
  save_metrics: true
  metrics_dir: "results"

baselines:
  fixed_time:
    ns_green_duration: 30
    ew_green_duration: 30
  random:
    seed: 42
